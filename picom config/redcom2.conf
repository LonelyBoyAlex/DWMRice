# backend
backend = "glx"
vsync = true #false

# round corners
corner-radius = 0

# fade (legacy, harmless to keep)
fade-delta = 5

# exclude stuff
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
];

#################################
#        ANIMATIONS (v12+)      #
#################################

animations = (

  #################################
  # Geometry change (keep yours)
  #################################
  {
    triggers = [ "geometry" ];
    preset = "appear";
    scale = "0.75";
    duration = "0.2";
    #preset = "geometry-change";
  },

  #################################
  # OPEN → slide up + fade + slight zoom
  #################################
  {
    triggers = ["open", "show"];

    opacity = {
      duration = 0.18;
      curve = "cubic-bezier(0.2, 0.8, 0.2, 1)";
      start = 0;
      end = "window-raw-opacity";
    };

    offset-y = {
      duration = 0.18;
      curve = "cubic-bezier(0.2, 0.8, 0.2, 1)";
      start = 40;     # slide from below
      end = 0;
    };

    scale-x = {
      duration = 0.18;
      start = 0.96;
      end = 1.0;
    };

    scale-y = "scale-x";
  },

  #################################
  # CLOSE → slide down + fade
  #################################
  {
    triggers = ["close", "hide"];

    opacity = {
      duration = 0.12;
      curve = "linear";
      start = "window-raw-opacity-before";
      end = 0;
    };

    offset-y = {
      duration = 0.12;
      curve = "cubic-bezier(0.4, 0, 1, 1)";
      start = 0;
      end = 40;      # slide down
    };

    scale-x = {
      duration = 0.12;
      start = 1.0;
      end = 0.97;
    };

    scale-y = "scale-x";
  }
);

#################################
#            RULES              #
#################################

opacity-rule = [
  "80:class_g = 'Sakura'"
];


blur:
{
  method = "dual_kawase";
  size = 20;
  deviation = 15.0;
  strength = 10;
};
